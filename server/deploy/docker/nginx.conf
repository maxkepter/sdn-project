# Nginx config phục vụ React SPA (CRA build output)
# Mounted bởi Dockerfile.frontend tại /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets (JS/CSS/images/fonts) trong 30 ngày, immutable
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA routing: mọi URL không match file -> trả về index.html để React Router xử lý
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}