apiVersion: v1
kind: Service
metadata:
  name: sdn-backend
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: sdn-backend
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP