# MongoDB StatefulSet (1 replica cho MVP, mở rộng được lên 3-replica với replSet rs0)
# Headless Service giúp các pod backend kết nối qua DNS:
#   mongo-0.mongo-headless.sdn.svc.cluster.local:27017
# Volume dùng volumeClaimTemplates -> tự động tạo PVC cho từng pod Mongo.

# ---- Headless Service -------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: mongo-headless
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: mongodb
spec:
  clusterIP: None
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo

# ---- StatefulSet ------------------------------------------------------------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: mongodb
spec:
  serviceName: mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        app.kubernetes.io/name: sdn-project
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongo
          image: mongo:7
          args:
            - "--bind_ip_all"
            # Bật replSet để dễ mở rộng replica về sau (chỉ 1 node hiện tại vẫn hoạt động)
            - "--replSet"
            - "rs0"
          ports:
            - name: mongo
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: sdn-project
          app.kubernetes.io/component: mongodb
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi