apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: mongodb
spec:
  serviceName: mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        app.kubernetes.io/name: sdn-project
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongo
          image: mongo:7
          # Standalone mode — không cần rs.initiate()
          # Khi cần HA, thêm lại: args: ["--replSet","rs0"] rồi initiate
          ports:
            - name: mongo
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: sdn-project
          app.kubernetes.io/component: mongodb
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi