apiVersion: v1
kind: ConfigMap
metadata:
  name: sdn-backend-config
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  UPLOAD_DIR: "/data/uploads"
  CLIENT_URL: "http://sdn.local"
  RATE_LIMIT_WINDOW_MIN: "15"
  RATE_LIMIT_MAX: "500"