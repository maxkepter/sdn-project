# Ingress-NGINX routing rules — Nginx hoạt động như Load Balancer L7
#
# Routes (truy cập qua http://localhost:8080 sau khi port-forward):
#   /api/*     -> backend (sdn-backend:80)
#   /uploads/* -> backend (serve static uploads từ PVC)
#   /health    -> backend (Health Check JSON)
#   /*         -> frontend (sdn-frontend:80)
#
# Lưu ý: prefix routing không rewrite path -> /api/v1/auth/login vẫn giữ nguyên khi tới backend,
# khớp với `app.use("/api/v1", routes)` trong server/src/app.js.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sdn-ingress
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: ingress
  annotations:
    # Timeout & body size (cho phép upload file ảnh/video)
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # Tắt SSL redirect cho local dev (không có TLS cert)
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # Bật CORS cho phép frontend gọi từ http://localhost:8080
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:8080"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization,Content-Type,X-Requested-With"
    # Load balancing algorithm: round_robin để chia đều traffic cho cả pod cũ và pod mới.
    # `least_conn` kết hợp với upstream keep-alive pool khiến 3 pod cũ "giữ chân"
    # hầu hết request, còn pod mới scale lên chỉ nhận được 1-2 request.
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    # Đóng keep-alive sau N request để Nginx phải tái thiết lập TCP tới upstream,
    # giúp thuật toán round_robin phân phối đều khi có pod mới Ready.
    nginx.ingress.kubernetes.io/upstream-keepalive-requests: "100"
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "50"
    # Retry upstream khác khi gặp lỗi mạng/5xx, giảm ảnh hưởng của single pod chậm.
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "10"
    # Health check chủ động của Ingress-NGINX (mặc định Ingress không tự gọi health).
    nginx.ingress.kubernetes.io/health-check-path: "/health"
    nginx.ingress.kubernetes.io/health-check-url: "/health"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sdn-backend
                port:
                  number: 80
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: sdn-backend
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: sdn-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sdn-frontend
                port:
                  number: 80