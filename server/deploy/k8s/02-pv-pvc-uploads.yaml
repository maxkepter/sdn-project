# PVC cho thư mục uploads của backend (shared giữa các pod)
# YÊU CẦU accessModes = ReadWriteMany để nhiều backend pod cùng đọc/ghi.
# Cần StorageClass hỗ trợ RWX (vd NFS, Longhorn, EFS).
# Nếu cluster default không hỗ trợ RWX, xem hướng dẫn cài NFS subdir provisioner
# trong server/deploy/README.md (phần "Prerequisites").
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sdn-uploads-pvc
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: uploads
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  # Nếu cluster có NFS subdir provisioner đã cài (xem README), dùng:
  storageClassName: nfs-client
  # Nếu dùng cluster hỗ trợ RWX mặc định (Longhorn/Rook-Ceph), đổi thành tên tương ứng
  # storageClassName: longhorn