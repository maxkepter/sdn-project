apiVersion: v1
kind: Secret
metadata:
  name: sdn-secrets
  namespace: sdn
  labels:
    app.kubernetes.io/name: sdn-project
    app.kubernetes.io/component: backend
type: Opaque
# Values are base64-encoded. Override before apply (see server/deploy/README.md).
#   echo -n 'your-jwt-secret' | base64
#   echo -n 'mongodb://mongo-0.mongo-headless.sdn.svc.cluster.local:27017/sdn_db' | base64
# Default DATABASE_URL trỏ tới Mongo StatefulSet trong cùng namespace (xem 04-mongodb.yaml)
stringData:
  # Bạn có thể dùng stringData để truyền plaintext — Kubernetes sẽ tự base64-encode lúc lưu.
  # Khi chuyển sang MongoDB Atlas: thay bằng mongodb+srv://user:pass@cluster.mongodb.net/sdn_db
  DATABASE_URL: "mongodb://mongo-0.mongo-headless.sdn.svc.cluster.local:27017/sdn_db"
  JWT_SECRET: "change-me-in-production-please-please-please"